// ─── Icons ───
function Stat({s,sz=14}){
  if(s==="sent")return<svg width={sz} height={sz} viewBox="0 0 20 20" fill="none"><path d="M5 10l3 3 7-7" stroke="#666" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;

  if(s==="seen")return<svg width={sz} height={sz} viewBox="0 0 20 20" fill="none"><path d="M3 10l3 3 7-7" stroke="#34B7F1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M8 10l3 3 7-7" stroke="#34B7F1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if(s==="failed")return<svg width={sz} height={sz} viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="#EF4444" strokeWidth="2"/><path d="M10 7v3" stroke="#EF4444" strokeWidth="2" strokeLinecap="round"/><circle cx="10" cy="13.5" r=".8" fill="#EF4444"/></svg>;
  return null;
}

// ─── Helpers ───
function timeAgo(d){const now=new Date(),dt=new Date(d),s=Math.floor((now-dt)/1000);if(s<60)return"עכשיו";if(s<3600)return`${Math.floor(s/60)} ד׳`;if(s<86400)return`${Math.floor(s/3600)} ש׳`;if(s<604800)return`${Math.floor(s/86400)} י׳`;return dt.toLocaleDateString("he-IL")}
function fmtTime(d){return new Date(d).toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})}
function fmtDate(d){const dt=new Date(d),t=new Date(),y=new Date(t);y.setDate(y.getDate()-1);if(dt.toDateString()===t.toDateString())return"היום";if(dt.toDateString()===y.toDateString())return"אתמול";return dt.toLocaleDateString("he-IL",{day:"numeric",month:"short",year:"numeric"})}
const CLR=["#E8B931","#4ECDC4","#FF6B6B","#A78BFA","#F97316","#06B6D4","#EC4899","#84CC16","#F43F5E","#8B5CF6"];
function clr(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return CLR[Math.abs(h)%CLR.length]}
function winInfo(msgs){const inc=msgs.filter(m=>m.direction==="in");if(!inc.length)return{open:false,remaining:0};const last=inc[inc.length-1],t=new Date(last.created_at),rem=24*60*60*1000-(new Date()-t);return{open:rem>0,remaining:Math.max(0,rem)}}
function fmtRem(ms){const h=Math.floor(ms/(1000*60*60)),m=Math.floor((ms%(1000*60*60))/(1000*60));return h>0?`${h}:${String(m).padStart(2,'0')} שעות`:`${m} דקות`}

function buildContacts(msgs){
  const m={};
  msgs.forEach(x=>{if(!m[x.number])m[x.number]={name:x.name,number:x.number,messages:[],unread:0};m[x.number].messages.push(x);if(x.direction==="in")m[x.number].unread++});
  return Object.values(m).map(c=>{c.messages.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));c.lastMessage=c.messages[c.messages.length-1];c.lastTime=c.lastMessage.created_at;c.window=winInfo(c.messages);return c}).sort((a,b)=>new Date(b.lastTime)-new Date(a.lastTime))
}

function groupByDate(msgs){const g=[];let cur=null;msgs.forEach(m=>{const d=new Date(m.created_at).toDateString();if(d!==cur){cur=d;g.push({type:"date",label:fmtDate(m.created_at)})}g.push({type:"message",data:m})});return g}

function LoginPage({ onLogin }) {
  const [email, setEmail] = React.useState("");
  const [pass, setPass] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setError("");
    const { data, error: err } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (err) { setError(err.message); setLoading(false); return; }
    onLogin(data.user);
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0A0C0F",padding:20}}>
      <div style={{width:"100%",maxWidth:360,animation:"fadeUp 0.4s ease-out"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:36,fontWeight:700,color:"#F5F5F5",marginBottom:4}}>⚡ Autoscale</div>
          <div style={{fontSize:14,color:"#25D366",fontWeight:500}}>WhatsApp · דונה</div>
        </div>
        <form onSubmit={handleLogin}>
          <div style={{marginBottom:14}}>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="אימייל" required dir="ltr"
              style={{width:"100%",padding:"14px 16px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,color:"#E5E5E5",fontSize:15,fontFamily:"'Rubik',system-ui"}}/>
          </div>
          <div style={{marginBottom:20}}>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="סיסמה" required dir="ltr"
              style={{width:"100%",padding:"14px 16px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,color:"#E5E5E5",fontSize:15,fontFamily:"'Rubik',system-ui"}}/>
          </div>
          {error && <div style={{color:"#EF4444",fontSize:13,marginBottom:14,textAlign:"center"}}>{error}</div>}
          <button type="submit" disabled={loading}
            style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#25D366,#128C7E)",border:"none",borderRadius:14,color:"#fff",fontSize:16,fontWeight:600,cursor:"pointer",fontFamily:"'Rubik',system-ui",opacity:loading?0.6:1}}>
            {loading?"מתחבר...":"התחבר"}
          </button>
        </form>
        <div style={{textAlign:"center",marginTop:30}}>
          <a href={WEBSITE_URL} target="_blank" style={{fontSize:11,color:"#444"}}>נבנה ע״י AutoScale ⚡ אוטומציות חכמות</a>
        </div>
      </div>
    </div>
  );
}

//  MAIN APP
// ══════════════════════════════
function App(){
  const [user, setUser] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [messages, setMessages] = React.useState([]);
  const [view, setView] = React.useState("contacts");
  const [activeChat, setActiveChat] = React.useState(null);
  const [replyText, setReplyText] = React.useState("");
  const [sending, setSending] = React.useState(false);
  const [search, setSearch] = React.useState("");
  const [showSent, setShowSent] = React.useState(false);
  const [showPremade, setShowPremade] = React.useState(false);
  const chatEndRef = React.useRef(null);
  const inputRef = React.useRef(null);

  // Check auth on load
  React.useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      if(session?.user) { setUser(session.user); fetchMessages(session.user.id); }
      setLoading(false);
    });
    const{data:{subscription}}=supabase.auth.onAuthStateChange((event,session)=>{
      if(session?.user){setUser(session.user)} else{setUser(null);setMessages([])}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Realtime subscription
  React.useEffect(()=>{
    if(!user) return;
    const channel = supabase.channel('messages-realtime')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`user_id=eq.${user.id}`},
        (payload)=>{ setMessages(prev=>[...prev,payload.new]) }
      )
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:`user_id=eq.${user.id}`},
        (payload)=>{ setMessages(prev=>prev.map(m=>m.id===payload.new.id?payload.new:m)) }
      )
      .subscribe();
    return()=>supabase.removeChannel(channel);
  },[user]);

  async function fetchMessages(uid){
    const{data,error}=await supabase.from('messages').select('*').eq('user_id',uid).order('created_at',{ascending:true});
    if(data) setMessages(data);
  }

  async function handleLogout(){
    await supabase.auth.signOut();
    setUser(null); setMessages([]); setView("contacts"); setActiveChat(null);
  }

  const contacts=buildContacts(messages);
  const totalUnread=contacts.reduce((s,c)=>s+c.unread,0);
  const filtered=contacts.filter(c=>{if(!search)return true;const q=search.toLowerCase();return c.name.toLowerCase().includes(q)||c.number.includes(q)});
  const ac=activeChat?contacts.find(c=>c.number===activeChat):null;
  const chatGroups=ac?groupByDate(ac.messages):[];
  const win=ac?ac.window:{open:false};

  React.useEffect(()=>{if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:"smooth"})},[activeChat,messages]);
  React.useEffect(()=>{if(activeChat&&inputRef.current&&win.open)inputRef.current.focus()},[activeChat]);

  async function sendReply(text){
    const msg=text||replyText;if(!msg.trim()||!ac)return;setSending(true);
    if(REPLY_WEBHOOK){try{await fetch(REPLY_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:ac.number,name:ac.name,message:msg.trim()})})}catch(e){console.error(e)}}
    setShowSent(true);setTimeout(()=>setShowSent(false),2200);setSending(false);setReplyText("");setShowPremade(false);
  }
  function insertPremade(pm){setReplyText(pm.text.replace(/\{name\}/g,ac?.name||""));setShowPremade(false);if(inputRef.current)inputRef.current.focus()}

  // Loading
  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0A0C0F"}}><div style={{width:28,height:28,border:"3px solid rgba(37,211,102,0.2)",borderTopColor:"#25D366",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;

  // Login
  if(!user) return <LoginPage onLogin={u=>{setUser(u);fetchMessages(u.id)}}/>;

  // Settings
  if(view==="settings") return <SettingsPage messages={messages} onClose={()=>setView("contacts")} user={user} onLogout={handleLogout}/>;

  // ═══ CONTACTS ═══
  if(!activeChat){
    return(
      <div style={S.shell}>
        <div style={S.header}>
          <div style={S.headerInner}>
            <div><div style={S.brand}><span style={{fontSize:18}}>⚡</span>Autoscale</div><div style={S.brandSub}>WhatsApp · דונה</div></div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {totalUnread>0&&<div style={S.unreadGlobal}>{totalUnread}</div>}
              <button onClick={()=>setView("settings")} style={S.settingsBtn}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
            </div>
          </div>
        </div>
        <div style={{padding:"12px 16px 6px"}}><div style={S.searchBox}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#444" strokeWidth="2.5"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input type="text" placeholder="חיפוש..." value={search} onChange={e=>setSearch(e.target.value)} style={S.searchInput} dir="rtl"/>{search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:13}}>✕</button>}</div></div>
        <div style={{flex:1,overflow:"auto"}}>
          {messages.length===0&&(
            <div style={{textAlign:"center",padding:"60px 20px",color:"#555"}}>
              <div style={{fontSize:40,marginBottom:16}}>📭</div>
              <div style={{fontSize:15,fontWeight:500,color:"#777",marginBottom:8}}>אין הודעות עדיין</div>
              <div style={{fontSize:13,color:"#555"}}>ברגע שהמערכת תתחיל לשלוח הודעות,<br/>הן יופיעו כאן</div>
            </div>
          )}
          {filtered.map((c,i)=>{
            const isOut=c.lastMessage.direction==="out";
            return(
              <div key={c.number} style={{...S.contactRow,animationDelay:`${i*35}ms`}} onClick={()=>setActiveChat(c.number)}>
                <div style={{position:"relative",flexShrink:0}}>
                  <div style={{...S.avatar,backgroundColor:clr(c.name)}}>{c.name.charAt(0)}</div>
                  <div style={{position:"absolute",bottom:-1,right:-1,width:12,height:12,borderRadius:6,border:"2.5px solid #0A0C0F",backgroundColor:c.window.open?"#25D366":"#333",boxShadow:c.window.open?"0 0 6px rgba(37,211,102,0.5)":"none"}}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                    <span style={{fontWeight:600,fontSize:15,color:"#F0F0F0"}}>{c.name}</span>
                    <span style={{fontSize:12,color:c.unread>0?"#25D366":"#444"}}>{timeAgo(c.lastTime)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:4,flex:1,minWidth:0}}>
                      {isOut&&<Stat s={c.lastMessage.status} sz={13}/>}
                      <span style={{fontSize:13,color:"#666",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} dir="rtl">{c.lastMessage.message.split("\n")[0].substring(0,42)}</span>
                    </div>
                    {c.unread>0&&<div style={S.badge}>{c.unread}</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <Footer/>
      </div>
    );
  }

  // ═══ CHAT ═══
  return(
    <div style={S.shell}>
      <div style={S.chatHead}>
        <button onClick={()=>{setActiveChat(null);setReplyText("");setShowPremade(false)}} style={S.backBtn}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg></button>
        <div style={{...S.avatar,width:40,height:40,fontSize:17,borderRadius:12,backgroundColor:clr(ac.name)}}>{ac.name.charAt(0)}</div>
        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:16,color:"#F0F0F0"}}>{ac.name}</div><div style={{fontSize:11,color:"#444",fontFamily:"monospace"}}>{ac.number}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,padding:"4px 10px",borderRadius:8,border:"1px solid",background:win.open?"rgba(37,211,102,0.1)":"rgba(239,68,68,0.08)",color:win.open?"#25D366":"#EF4444",borderColor:win.open?"rgba(37,211,102,0.2)":"rgba(239,68,68,0.15)"}}>
          <div style={{width:6,height:6,borderRadius:3,backgroundColor:win.open?"#25D366":"#EF4444"}}/>{win.open?"פתוח":"נעול"}
        </div>
      </div>

      <div style={{padding:"7px 16px",borderBottom:"1px solid",background:win.open?"rgba(37,211,102,0.04)":"rgba(239,68,68,0.03)",borderBottomColor:win.open?"rgba(37,211,102,0.06)":"rgba(239,68,68,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,fontWeight:500}}>
          {win.open?<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#25D366" strokeWidth="2.5" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span style={{color:"#8BC9A0"}}>נותרו {fmtRem(win.remaining)}</span><div style={{flex:1,height:3,background:"rgba(255,255,255,0.04)",borderRadius:2,overflow:"hidden",marginLeft:6}}><div style={{height:"100%",background:"linear-gradient(90deg,#128C7E,#25D366)",borderRadius:2,width:`${(win.remaining/(24*60*60*1000))*100}%`}}/></div></>
          :<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#EF4444" strokeWidth="2.5" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span style={{color:"#888"}}>נעול — ממתין לתשובת הלקוח</span></>}
        </div>
      </div>

      <div style={{flex:1,overflow:"auto",padding:"14px 14px 150px",display:"flex",flexDirection:"column",gap:3,background:"#0A0C0F"}}>
        {chatGroups.map((item,i)=>{
          if(item.type==="date")return<div key={`d${i}`} style={{textAlign:"center",padding:"12px 0 6px"}}><span style={{fontSize:11,color:"#444",background:"rgba(255,255,255,0.025)",padding:"3px 12px",borderRadius:7,fontWeight:500}}>{item.label}</span></div>;
          const m=item.data,out=m.direction==="out";
          return(
            <div key={m.id} style={{display:"flex",justifyContent:out?"flex-end":"flex-start",animation:"fadeUp 0.15s ease-out both"}}>
              <div style={{maxWidth:"82%",borderRadius:14,padding:"9px 13px 5px",...(out?{background:"#173D2A",borderBottomRightRadius:4}:{background:"#1A1C22",borderBottomLeftRadius:4,border:"1px solid rgba(255,255,255,0.03)"})}}>
                <div style={{fontSize:14,lineHeight:1.55,whiteSpace:"pre-wrap",wordBreak:"break-word",color:"#DDD"}} dir="rtl">{m.message}</div>
                <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:5,marginTop:3}}>
                  <span style={{fontSize:10,color:"#555"}}>{fmtTime(m.created_at)}</span>
                  {out&&<Stat s={m.status} sz={14}/>}
                </div>
              </div>
            </div>
          );
        })}
        <div ref={chatEndRef}/>
      </div>

      {showPremade&&win.open&&(
        <div style={S.pmPanel}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 16px",borderBottom:"1px solid rgba(255,255,255,0.03)",position:"sticky",top:0,background:"#161920",borderRadius:"16px 16px 0 0"}}>
            <span style={{fontWeight:600,fontSize:13,color:"#bbb"}}>הודעות מוכנות</span>
            <button onClick={()=>setShowPremade(false)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:14}}>✕</button>
          </div>
          <div style={{padding:"4px 0"}}>
            {PREMADE.map(pm=>(
              <div key={pm.id} style={{padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.015)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:500,color:"#ddd"}}>{pm.label}</span>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>insertPremade(pm)} style={S.pmEditBtn}>ערוך ✏</button>
                    <button onClick={()=>sendReply(pm.text.replace(/\{name\}/g,ac?.name||""))} style={S.pmSendBtn}>שלח →</button>
                  </div>
                </div>
                <div style={{fontSize:12,color:"#555",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} dir="rtl">{pm.text.replace(/\{name\}/g,ac?.name||"").split("\n")[0]}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={S.replyBar}>
        {showSent&&<div style={{textAlign:"center",color:"#25D366",fontSize:13,fontWeight:500,marginBottom:6,animation:"toast 2s ease-out forwards"}}>✓ נשלח</div>}
        {win.open?(
          <div style={{display:"flex",alignItems:"flex-end",gap:8}}>
            <button onClick={()=>setShowPremade(!showPremade)} style={{...S.pmToggle,background:showPremade?"rgba(37,211,102,0.12)":"rgba(255,255,255,0.03)",borderColor:showPremade?"rgba(37,211,102,0.25)":"rgba(255,255,255,0.05)",color:showPremade?"#25D366":"#666"}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </button>
            <textarea ref={inputRef} value={replyText} onChange={e=>setReplyText(e.target.value)} placeholder={`כתוב ל${ac.name}...`} style={S.input} rows={1} dir="rtl"
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendReply()}}}
              onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px"}}/>
            <button onClick={()=>sendReply()} disabled={!replyText.trim()||sending} style={{...S.sendBtn,opacity:!replyText.trim()||sending?0.3:1}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        ):(
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 6px",borderRadius:14,background:"rgba(239,68,68,0.03)",border:"1px solid rgba(239,68,68,0.07)"}}>
            <div style={{width:44,height:44,borderRadius:13,background:"rgba(239,68,68,0.06)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EF4444" strokeWidth="2" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
            <div><div style={{fontSize:13,fontWeight:600,color:"#EF4444"}}>החלון נעול</div><div style={{fontSize:11,color:"#666",marginTop:1}}>הלקוח צריך להשיב כדי לפתוח חלון 24 שעות חדש</div></div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Styles ───
const S={
  shell:{fontFamily:"'Rubik',system-ui,sans-serif",background:"#0A0C0F",minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",color:"#E5E5E5",position:"relative"},
  header:{background:"#10131A",borderBottom:"1px solid rgba(255,255,255,0.03)",padding:"18px 20px 14px"},
  headerInner:{display:"flex",justifyContent:"space-between",alignItems:"center"},
  brand:{fontSize:22,fontWeight:700,color:"#F5F5F5",letterSpacing:"-0.5px",display:"flex",alignItems:"center",gap:8},
  brandSub:{fontSize:12,color:"#25D366",fontWeight:500,marginTop:2},
  unreadGlobal:{background:"#25D366",color:"#000",fontWeight:700,fontSize:13,borderRadius:20,padding:"3px 10px"},
  settingsBtn:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:11,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",color:"#777",cursor:"pointer"},
  searchBox:{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"10px 14px",border:"1px solid rgba(255,255,255,0.03)"},
  searchInput:{flex:1,background:"none",border:"none",color:"#E5E5E5",fontSize:14,fontFamily:"'Rubik',system-ui"},
  contactRow:{display:"flex",alignItems:"center",gap:14,padding:"13px 20px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.02)",animation:"fadeUp 0.3s ease-out both",transition:"background 0.12s"},
  avatar:{width:50,height:50,borderRadius:15,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:600,fontSize:21,color:"#fff"},
  badge:{background:"#25D366",color:"#000",fontWeight:700,fontSize:11,borderRadius:10,padding:"2px 7px",minWidth:20,textAlign:"center",flexShrink:0},
  chatHead:{background:"#10131A",borderBottom:"1px solid rgba(255,255,255,0.03)",padding:"12px 14px",display:"flex",alignItems:"center",gap:11,position:"sticky",top:0,zIndex:50},
  backBtn:{background:"none",border:"none",color:"#25D366",cursor:"pointer",padding:2,display:"flex"},
  replyBar:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"linear-gradient(to top,#10131A 85%,rgba(16,19,26,0.97))",padding:"8px 14px 14px",borderTop:"1px solid rgba(255,255,255,0.03)",zIndex:50},
  input:{flex:1,padding:"11px 13px",background:"rgba(255,255,255,0.035)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:14,color:"#E5E5E5",fontSize:14,fontFamily:"'Rubik',system-ui",resize:"none",lineHeight:1.4,maxHeight:120,overflow:"auto"},
  sendBtn:{width:44,height:44,borderRadius:13,background:"linear-gradient(135deg,#25D366,#128C7E)",border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"opacity 0.15s"},
  pmToggle:{width:44,height:44,borderRadius:13,border:"1px solid",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"},
  pmPanel:{position:"fixed",bottom:74,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 28px)",maxWidth:452,background:"#161920",border:"1px solid rgba(255,255,255,0.05)",borderRadius:16,zIndex:60,animation:"slideUp 0.2s ease-out",maxHeight:300,overflow:"auto",boxShadow:"0 -6px 25px rgba(0,0,0,0.5)"},
  pmEditBtn:{fontSize:11,fontWeight:500,color:"#888",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:"'Rubik',system-ui"},
  pmSendBtn:{fontSize:11,fontWeight:600,color:"#25D366",background:"rgba(37,211,102,0.08)",border:"1px solid rgba(37,211,102,0.18)",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:"'Rubik',system-ui"},
  footer:{padding:"24px 20px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:8},
  referralBtn:{marginTop:8,padding:"10px 24px",background:"linear-gradient(135deg,rgba(232,185,49,0.08),rgba(232,185,49,0.04))",border:"1px solid rgba(232,185,49,0.15)",borderRadius:12,color:"#E8B931",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Rubik',system-ui"},
  settingsHead:{background:"#10131A",borderBottom:"1px solid rgba(255,255,255,0.03)",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50},
  sTabs:{display:"flex",gap:0,borderBottom:"1px solid rgba(255,255,255,0.03)"},
  sTab:{flex:1,padding:"12px 0",background:"none",border:"none",borderBottom:"2px solid transparent",color:"#666",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"'Rubik',system-ui"},
  sTabActive:{color:"#25D366",borderBottomColor:"#25D366"},
  costGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20},
  costCard:{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:"16px 14px",textAlign:"center"},
  costLabel:{fontSize:11,color:"#666",marginBottom:6,fontWeight:500},
  costValue:{fontSize:22,fontWeight:700,color:"#F0F0F0"},
  costSection:{marginBottom:20},
  costSectionTitle:{fontSize:13,fontWeight:600,color:"#888",marginBottom:10,paddingBottom:6,borderBottom:"1px solid rgba(255,255,255,0.03)"},
  costRow:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.02)"},
  accountItem:{display:"flex",alignItems:"center",gap:14,padding:"16px 4px",borderBottom:"1px solid rgba(255,255,255,0.03)",cursor:"pointer"},
  accountIcon:{width:42,height:42,borderRadius:12,background:"rgba(255,255,255,0.03)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
