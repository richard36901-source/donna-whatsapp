function Stat({s,sz=16}){
  if(s==="sent")return<svg width={sz} height={sz} viewBox="0 0 20 20" fill="none"><path d="M5 10l3 3 7-7" stroke="#666" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;

  if(s==="failed")return<svg width={sz} height={sz} viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="#EF4444" strokeWidth="2"/><path d="M10 7v3" stroke="#EF4444" strokeWidth="2" strokeLinecap="round"/><circle cx="10" cy="13.5" r=".8" fill="#EF4444"/></svg>;
  return null;

function timeAgo(d){const n=new Date(),dt=new Date(d),s=Math.floor((n-dt)/1000);if(s<60)return"עכשיו";if(s<3600)return`${Math.floor(s/60)} ד׳`;if(s<86400)return`${Math.floor(s/3600)} ש׳`;if(s<604800)return`${Math.floor(s/86400)} י׳`;return dt.toLocaleDateString("he-IL")}
function fmtTime(d){return new Date(d).toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})}
function fmtDate(d){const dt=new Date(d),t=new Date(),y=new Date(t);y.setDate(y.getDate()-1);if(dt.toDateString()===t.toDateString())return"היום";if(dt.toDateString()===y.toDateString())return"אתמול";return dt.toLocaleDateString("he-IL",{day:"numeric",month:"short",year:"numeric"})}
function winInfo(msgs){const inc=msgs.filter(m=>m.direction==="in");if(!inc.length)return{open:false,remaining:0};const last=inc[inc.length-1],t=new Date(last.created_at),rem=24*60*60*1000-(new Date()-t);return{open:rem>0,remaining:Math.max(0,rem)}}
function fmtRem(ms){const h=Math.floor(ms/(1000*60*60)),m=Math.floor((ms%(1000*60*60))/(1000*60));return h>0?`${h}:${String(m).padStart(2,'0')} שעות`:`${m} דקות`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function buildContacts(msgs,meta={}){
  const m={};
  msgs.forEach(x=>{if(!m[x.number])m[x.number]={name:x.name,number:x.number,messages:[],unread:0,tags:[],emoji:"",display_name:"",handleStatus:"חדש",profile_pic:""};m[x.number].messages.push(x);if(x.direction==="in")m[x.number].unread++});
  return Object.values(m).map(c=>{
    c.messages.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    c.lastMessage=c.messages[c.messages.length-1];c.lastTime=c.lastMessage.created_at;
    c.window=winInfo(c.messages);c.failedCount=c.messages.filter(m=>m.status==="failed").length;
    const mt=meta[c.number];if(mt){Object.assign(c,{tags:mt.tags||c.tags,emoji:mt.emoji||"",display_name:mt.display_name||"",handleStatus:mt.handleStatus||"חדש",profile_pic:mt.profile_pic||""})}
    if(!c.emoji)c.emoji=emojiFor(c.name);
    return c;
  }).sort((a,b)=>new Date(b.lastTime)-new Date(a.lastTime));
}
function groupByDate(msgs){const g=[];let cur=null;msgs.forEach(m=>{const d=new Date(m.created_at).toDateString();if(d!==cur){cur=d;g.push({type:"date",label:fmtDate(m.created_at)})}g.push({type:"message",data:m})});return g}

// ── Avatar with emoji ──
function Av({emoji,pic,size=58,radius=18,fontSize=28}){
  if(pic)return<img src={pic} style={{width:size,height:size,borderRadius:radius,objectFit:"cover"}} alt=""/>;
  return<div style={{width:size,height:size,borderRadius:radius,display:"flex",alignItems:"center",justifyContent:"center",fontSize,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>{emoji||"👤"}</div>;
}
function TagPill({name,color,onRemove,onClick}){
  return<span onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:12,fontWeight:500,color,background:color+"18",border:`1px solid ${color}30`,borderRadius:8,padding:"3px 10px",whiteSpace:"nowrap",cursor:onClick?"pointer":"default"}}>
    {name}{onRemove&&<button onClick={e=>{e.stopPropagation();onRemove()}} style={{background:"none",border:"none",color:color+"99",cursor:"pointer",fontSize:11,padding:0}}>✕</button>}
  </span>;
}
function StatusBadge({status,big}){
  const s=STS.find(x=>x.key===status)||STS[0];

}

function Overlay({children,onClose}){

// ══════ QUICK EDIT POPUP ══════
function QuickEdit({contact,tags:allTags,onClose,onSave}){

      {tab==="site"&&<div style={{padding:20}}>
        <div style={S.fg}><label style={S.fl}>שם העסק</label><input value={sn} onChange={e=>setSn(e.target.value)} style={{...S.fieldInput,fontSize:18,fontWeight:600}} dir="rtl"/></div>
        <button onClick={()=>onSiteNameChange(sn)} style={{...S.saveBtn,padding:"14px 24px",fontSize:15}}>💾 שמור</button>
        <div style={{marginTop:30,padding:20,background:"rgba(255,255,255,0.02)",borderRadius:16,border:"1px solid rgba(255,255,255,0.04)"}}>
          <div style={{fontSize:15,fontWeight:600,color:"#ccc",marginBottom:12}}>פרטי חיבור</div>
          <div style={{fontSize:13,color:"#666",marginBottom:8}}>Supabase URL</div><div style={{fontSize:12,color:"#444",marginBottom:14,wordBreak:"break-all",fontFamily:"monospace"}}>{SB_URL}</div>
          <div style={{fontSize:13,color:"#666",marginBottom:8}}>Reply Webhook</div><div style={{fontSize:12,color:"#444",marginBottom:14,wordBreak:"break-all",fontFamily:"monospace"}}>{REPLY_WEBHOOK||"לא מוגדר"}</div>
          <div style={{fontSize:13,color:"#666",marginBottom:8}}>עלות להודעה</div><div style={{fontSize:14,color:"#E8B931",fontWeight:600}}>${COST_PER_MSG}</div>
        </div>
      </div>}

      {tab==="costs"&&<div style={{padding:20}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
          <div style={S.costCard}><div style={{fontSize:12,color:"#666",marginBottom:8}}>הודעות יוצאות</div><div style={{fontSize:28,fontWeight:700,color:"#F0F0F0"}}>{out.length}</div></div>
          <div style={S.costCard}><div style={{fontSize:12,color:"#666",marginBottom:8}}>עלות כוללת</div><div style={{fontSize:28,fontWeight:700,color:"#E8B931"}}>${total}</div></div>
        </div>
        {Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([mo,d])=>
          <div key={mo} style={{display:"flex",justifyContent:"space-between",padding:"14px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}><span style={{color:"#aaa",fontSize:16}}>{mo}</span><div style={{display:"flex",gap:16,alignItems:"center"}}><span style={{color:"#666",fontSize:14}}>{d.count}</span><span style={{color:"#E8B931",fontWeight:600,fontSize:16}}>${d.cost.toFixed(2)}</span></div></div>
        )}
      </div>}

      {tab==="account"&&<div style={{padding:20}}>
        <div style={{...S.accountItem,padding:"18px 4px"}} onClick={()=>setChangingPass(!changingPass)}>
          <div style={S.accountIcon}>🔒</div>
          <div style={{flex:1}}><div style={{fontSize:16,fontWeight:500,color:"#ddd"}}>שינוי סיסמה</div><div style={{fontSize:14,color:"#666",marginTop:2}}>{user?.email}</div></div>
        </div>
        {changingPass&&<div style={{padding:"14px 0",animation:"fadeUp 0.2s"}}>
          <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="סיסמה חדשה" dir="ltr" style={{...S.fieldInput,fontSize:16,marginBottom:12}}/>
          {passMsg&&<div style={{fontSize:14,color:passMsg.startsWith("✓")?"#25D366":"#EF4444",marginBottom:12}}>{passMsg}</div>}
          <button onClick={changePassword} style={{...S.saveBtn,padding:"12px 24px",fontSize:15}}>עדכן</button>
        </div>}
        <div style={{...S.accountItem,borderBottom:"none",padding:"18px 4px"}} onClick={onLogout}>
          <div style={{...S.accountIcon,background:"rgba(239,68,68,0.08)",fontSize:20}}>🚪</div>
          <div style={{flex:1}}><div style={{fontSize:16,fontWeight:500,color:"#EF4444"}}>התנתקות</div></div>
        </div>
      </div>}
    </div>
  </div>;
}

// ══════ FOOTER ══════
function Footer(){return<div style={{padding:"28px 20px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
  <div style={{width:40,height:1,background:"rgba(255,255,255,0.04)",marginBottom:8}}/>
  <a href={WEBSITE} target="_blank" rel="noopener" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
    <span style={{fontSize:12,color:"#444"}}>נבנה ע״י</span><span style={{fontSize:15,fontWeight:600,color:"#888"}}>⚡ AutoScale</span><span style={{fontSize:12,color:"#555"}}>אוטומציות חכמות</span>
  </a>
  <a href={"mailto:"+EMAIL_ADDR} style={{fontSize:13,color:"#444"}}>{EMAIL_ADDR}</a>
  <button style={{marginTop:8,padding:"12px 28px",background:"linear-gradient(135deg,rgba(232,185,49,0.1),rgba(232,185,49,0.04))",border:"1px solid rgba(232,185,49,0.18)",borderRadius:14,color:"#E8B931",fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>🎁 המלץ וקבל חודש חינם</button>
</div>}

// ══════ MAIN ══════
function App(){
  const[user,setUser]=React.useState(null);const[loading,setLoading]=React.useState(true);
  const[messages,setMessages]=React.useState([]);const[meta,setMeta]=React.useState({});
  const[tags,setTags]=React.useState(DEFAULT_TAGS);const[templates,setTemplates]=React.useState(DEFAULT_TEMPLATES);
  const[siteName,setSiteName]=React.useState("דונה");
  const[view,setView]=React.useState("contacts");const[activeChat,setActiveChat]=React.useState(null);
  const[quickEdit,setQuickEdit]=React.useState(null);
  const[replyText,setReplyText]=React.useState("");const[sending,setSending]=React.useState(false);
  const[search,setSearch]=React.useState("");const[showSent,setShowSent]=React.useState(false);
  const[showPremade,setShowPremade]=React.useState(false);const[statusFilter,setStatusFilter]=React.useState("all");
  const[selectMode,setSelectMode]=React.useState(false);const[selected,setSelected]=React.useState(new Set());
  const[bulkConfirm,setBulkConfirm]=React.useState(false);
  const[dragContact,setDragContact]=React.useState(null);
  const[dragOverTab,setDragOverTab]=React.useState(null);
  const[touchDrag,setTouchDrag]=React.useState(null);
  const[touchGhost,setTouchGhost]=React.useState(null);
  const tabRefs=React.useRef({});
  const chatEndRef=React.useRef(null);const inputRef=React.useRef(null);

  // Touch drag handlers
  function handleTouchStart(e,contact){
    const timer=setTimeout(()=>{
      const touch=e.touches[0];
      setTouchDrag({number:contact.number,name:contact.display_name||contact.name,emoji:contact.emoji});
      setTouchGhost({x:touch.clientX,y:touch.clientY});
      if(navigator.vibrate)navigator.vibrate(30);
    },400);
    e.currentTarget._dragTimer=timer;
  }
  function handleTouchMove(e){
    if(!touchDrag)return;
    e.preventDefault();
    const touch=e.touches[0];
    setTouchGhost({x:touch.clientX,y:touch.clientY});
    // Check which tab we're over
    let overTab=null;
    for(const[key,el] of Object.entries(tabRefs.current)){
      if(el){const r=el.getBoundingClientRect();if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){overTab=key;break}}}
    setDragOverTab(overTab);
  }
  function handleTouchEnd(e){
    if(e.currentTarget._dragTimer)clearTimeout(e.currentTarget._dragTimer);
    if(!touchDrag){return}
    if(dragOverTab&&dragOverTab!=="all"){updateMeta(touchDrag.number,{handleStatus:dragOverTab})}
    setTouchDrag(null);setTouchGhost(null);setDragOverTab(null);
  }
  function handleTouchCancel(e){if(e.currentTarget._dragTimer)clearTimeout(e.currentTarget._dragTimer);setTouchDrag(null);setTouchGhost(null);setDragOverTab(null)}

  // Desktop drag handlers
  function handleDragStart(e,contact){e.dataTransfer.setData("text/plain",contact.number);setDragContact(contact.number)}
  function handleDragEnd(){setDragContact(null);setDragOverTab(null)}
  function handleTabDragOver(e,key){e.preventDefault();setDragOverTab(key)}
  function handleTabDragLeave(){setDragOverTab(null)}
  function handleTabDrop(e,key){e.preventDefault();const num=e.dataTransfer.getData("text/plain")||dragContact;if(num&&key!=="all")updateMeta(num,{handleStatus:key});setDragContact(null);setDragOverTab(null)}

  React.useEffect(()=>{sb.auth.getSession().then(({data:{session}})=>{if(session?.user){setUser(session.user);fetchMsgs(session.user.id)}setLoading(false)});const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{if(s?.user)setUser(s.user);else{setUser(null);setMessages([])}});return()=>subscription.unsubscribe()},[]);
  React.useEffect(()=>{if(!user)return;const ch=sb.channel('rt').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`user_id=eq.${user.id}`},p=>setMessages(prev=>[...prev,p.new])).on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:`user_id=eq.${user.id}`},p=>setMessages(prev=>prev.map(m=>m.id===p.new.id?p.new:m))).subscribe();return()=>sb.removeChannel(ch)},[user]);

  async function fetchMsgs(uid){const{data}=await sb.from('messages').select('*').eq('user_id',uid).order('created_at',{ascending:true});if(data)setMessages(data)}
  async function handleLogout(){await sb.auth.signOut();setUser(null);setMessages([]);setView("contacts");setActiveChat(null)}
  function updateMeta(n,u){setMeta(p=>({...p,[n]:{...(p[n]||{}),...u}}))}

  function openChat(number){
    setActiveChat(number);
    const c=contacts.find(x=>x.number===number);
    if(c&&READ_WEBHOOK){const ids=c.messages.filter(m=>m.direction==="in"&&m.message_id).map(m=>m.message_id);if(ids.length)fetch(READ_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"read",number,message_ids:ids})}).catch(()=>{})}
    if(c&&(meta[number]?.handleStatus||"חדש")==="חדש")updateMeta(number,{handleStatus:"בטיפול"});
  }

  const contacts=buildContacts(messages,meta);
  const totalUnread=contacts.reduce((s,c)=>s+c.unread,0);
  const visibleContacts=contacts.filter(c=>{
    if(statusFilter!=="all"&&c.handleStatus!==statusFilter)return false;
    if(!search)return true;const q=search.toLowerCase(),dn=(c.display_name||c.name).toLowerCase();
    return dn.includes(q)||c.number.includes(q)||c.tags.some(t=>t.toLowerCase().includes(q));
  });
  const ac=activeChat?contacts.find(c=>c.number===activeChat):null;
  const chatGroups=ac?groupByDate(ac.messages):[];const win=ac?ac.window:{open:false};
  const displayName=ac?(ac.display_name||ac.name):"";

  React.useEffect(()=>{if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:"smooth"})},[activeChat,messages]);
  React.useEffect(()=>{if(activeChat&&inputRef.current&&win.open)inputRef.current.focus()},[activeChat]);

  async function sendReply(text){const msg=text||replyText;if(!msg.trim()||!ac)return;setSending(true);try{await fetch(REPLY_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:ac.number,name:displayName,message:msg.trim()})})}catch(e){}updateMeta(ac.number,{handleStatus:"בטיפול"});setShowSent(true);setTimeout(()=>setShowSent(false),2200);setSending(false);setReplyText("");setShowPremade(false)}
  async function resendMsg(m){try{await fetch(REPLY_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:m.number,name:m.name,message:m.message,resend_id:m.message_id})})}catch(e){}}
  function insertPremade(pm){setReplyText(pm.text.replace(/\{name\}/g,displayName));setShowPremade(false);if(inputRef.current)inputRef.current.focus()}
  function toggleSelect(n){setSelected(p=>{const s=new Set(p);s.has(n)?s.delete(n):s.add(n);return s})}
  function bulkSetStatus(st){selected.forEach(n=>updateMeta(n,{handleStatus:st}));setSelected(new Set());setSelectMode(false)}

  if(loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0A0C0F"}}><div style={{width:32,height:32,border:"3px solid rgba(37,211,102,0.2)",borderTopColor:"#25D366",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;
  if(!user)return<LoginPage onLogin={u=>{setUser(u);fetchMsgs(u.id)}}/>;
  if(view==="settings")return<SettingsPage messages={messages} onClose={()=>setView("contacts")} user={user} onLogout={handleLogout} tags={tags} onAddTag={(n,c)=>setTags(p=>[...p,{name:n,color:c}])} onDeleteTag={n=>setTags(p=>p.filter(t=>t.name!==n))} templates={templates} onSetTemplates={setTemplates} siteName={siteName} onSiteNameChange={setSiteName}/>;

  // ═══ CONTACTS ═══
  if(!activeChat){
    const stCounts={};contacts.forEach(c=>{stCounts[c.handleStatus]=(stCounts[c.handleStatus]||0)+1});
    return<div style={S.shell}>
      {/* Quick edit overlay */}
      {quickEdit&&<QuickEdit contact={quickEdit} tags={tags} onClose={()=>setQuickEdit(null)} onSave={u=>{updateMeta(quickEdit.number,u);setQuickEdit(null)}}/>}

      <div style={S.header}><div style={S.headerInner}>
        <div><div style={{fontSize:24,fontWeight:700,color:"#F5F5F5",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>⚡</span>Autoscale</div><div style={{fontSize:13,color:"#25D366",fontWeight:500,marginTop:3}}>WhatsApp · {siteName}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {totalUnread>0&&<div style={{background:"#25D366",color:"#000",fontWeight:700,fontSize:14,borderRadius:20,padding:"4px 12px"}}>{totalUnread}</div>}
          <button onClick={()=>setSelectMode(!selectMode)} style={{...S.hdrBtn,borderColor:selectMode?"rgba(37,211,102,0.3)":"rgba(255,255,255,0.05)",color:selectMode?"#25D366":"#777"}} title="בחירה">☑</button>
          <button onClick={()=>setView("settings")} style={S.hdrBtn}>⚙</button>
        </div>
      </div></div>

      {/* Status tabs — drop targets */}
      <div style={S.statusTabs}>
        <button onClick={()=>setStatusFilter("all")} ref={el=>tabRefs.current["all"]=el} onDragOver={e=>handleTabDragOver(e,"all")} onDragLeave={handleTabDragLeave} onDrop={e=>handleTabDrop(e,"all")} style={{...S.stTab,...(statusFilter==="all"?{color:"#F0F0F0",borderBottomColor:"#F0F0F0"}:{})}}>הכל <span style={{color:"#555"}}>{contacts.length}</span></button>
        {STS.map(st=><button key={st.key} ref={el=>tabRefs.current[st.key]=el} onClick={()=>setStatusFilter(st.key)} onDragOver={e=>handleTabDragOver(e,st.key)} onDragLeave={handleTabDragLeave} onDrop={e=>handleTabDrop(e,st.key)} style={{...S.stTab,...(statusFilter===st.key?{color:st.color,borderBottomColor:st.color}:{}),...(dragOverTab===st.key?{background:st.color+"25",color:st.color,borderBottomColor:st.color,transform:"scale(1.08)",transition:"all 0.15s"}:{transition:"all 0.15s"})}}>{st.icon} {st.label} <span style={{color:"#555"}}>{stCounts[st.key]||0}</span></button>)}
      </div>

      <div style={{padding:"10px 18px 6px"}}><div style={{display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"12px 16px",border:"1px solid rgba(255,255,255,0.03)"}}><span style={{fontSize:16}}>🔍</span><input type="text" placeholder="חיפוש שם, מספר, תגית..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,background:"none",border:"none",color:"#E5E5E5",fontSize:16,fontFamily:"inherit"}} dir="rtl"/>{search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:16}}>✕</button>}</div></div>

      {/* Bulk bar */}
      {selectMode&&selected.size>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 18px",background:"rgba(255,255,255,0.02)",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
        <span style={{fontSize:15,color:"#ccc",fontWeight:500}}>{selected.size} נבחרו</span>
        <div style={{display:"flex",gap:8}}>
          {STS.map(st=><button key={st.key} onClick={()=>bulkSetStatus(st.key)} style={{padding:"8px 12px",borderRadius:10,border:`1px solid ${st.color}30`,background:"transparent",cursor:"pointer",fontSize:14,color:st.color,fontFamily:"inherit"}}>{st.icon}</button>)}
          {!bulkConfirm?<button onClick={()=>setBulkConfirm(true)} style={{padding:"8px 12px",borderRadius:10,border:"1px solid rgba(239,68,68,0.3)",background:"transparent",cursor:"pointer",fontSize:14,color:"#EF4444"}}>🗑</button>
          :<button onClick={()=>{setBulkConfirm(false);setSelected(new Set());setSelectMode(false)}} style={{padding:"8px 12px",borderRadius:10,border:"1px solid rgba(239,68,68,0.4)",background:"rgba(239,68,68,0.15)",cursor:"pointer",fontSize:14,color:"#EF4444",fontFamily:"inherit"}}>⚠ אשר</button>}
        </div>
      </div>}

      {/* Contact list */}
      <div style={{flex:1,overflow:"auto",touchAction:touchDrag?"none":"auto"}}>
        {messages.length===0&&<div style={{textAlign:"center",padding:"80px 20px",color:"#555"}}><div style={{fontSize:48,marginBottom:20}}>📭</div><div style={{fontSize:18,fontWeight:500,color:"#777"}}>אין הודעות עדיין</div></div>}
        {visibleContacts.map((c,i)=>{
          const isOut=c.lastMessage.direction==="out",dn=c.display_name||c.name,isSel=selected.has(c.number);
          return<div key={c.number} draggable={!selectMode} onDragStart={e=>handleDragStart(e,c)} onDragEnd={handleDragEnd} onTouchStart={e=>!selectMode&&handleTouchStart(e,c)} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} onTouchCancel={handleTouchCancel} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px",cursor:dragContact===c.number?"grabbing":"pointer",borderBottom:"1px solid rgba(255,255,255,0.025)",animation:"fadeUp 0.3s ease-out both",animationDelay:`${i*25}ms`,background:isSel?"rgba(37,211,102,0.06)":dragContact===c.number?"rgba(255,255,255,0.04)":"transparent",opacity:dragContact===c.number?0.5:1,transition:"opacity 0.15s"}}>

            {/* Checkbox in select mode */}
            {selectMode&&<div onClick={()=>toggleSelect(c.number)} style={{width:26,height:26,borderRadius:8,border:`2px solid ${isSel?"#25D366":"#444"}`,background:isSel?"#25D366":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{isSel&&<span style={{fontSize:14,color:"#000"}}>✓</span>}</div>}

            {/* Avatar + tap to open chat */}
            <div onClick={()=>selectMode?toggleSelect(c.number):openChat(c.number)} style={{display:"flex",alignItems:"center",gap:14,flex:1,minWidth:0}}>
              <div style={{position:"relative",flexShrink:0}}>
                <Av emoji={c.emoji} pic={c.profile_pic} size={58} radius={18} fontSize={28}/>
                <div style={{position:"absolute",bottom:-2,right:-2,width:14,height:14,borderRadius:7,border:"2.5px solid #0A0C0F",backgroundColor:c.window.open?"#25D366":"#333"}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:600,fontSize:17,color:"#F0F0F0"}}>{dn}</span>
                    <StatusBadge status={c.handleStatus}/>
                    {c.failedCount>0&&<span style={{fontSize:11,color:"#EF4444",fontWeight:600}}>⚠</span>}
                  </div>
                  <span style={{fontSize:13,color:c.unread>0?"#25D366":"#444"}}>{timeAgo(c.lastTime)}</span>
                </div>
                {c.tags.length>0&&<div style={{display:"flex",gap:4,marginBottom:4,flexWrap:"wrap"}}>{c.tags.slice(0,3).map(t=>{const tag=tags.find(x=>x.name===t);return<TagPill key={t} name={t} color={tag?.color||"#888"}/>})}</div>}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,flex:1,minWidth:0}}>
                    {isOut&&<Stat s={c.lastMessage.status} sz={15}/>}
                    <span style={{fontSize:15,color:"#666",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} dir="rtl">{c.lastMessage.message.split("\n")[0].substring(0,36)}</span>
                  </div>
                  {c.unread>0&&<div style={{background:"#25D366",color:"#000",fontWeight:700,fontSize:12,borderRadius:12,padding:"3px 8px",minWidth:22,textAlign:"center",flexShrink:0}}>{c.unread}</div>}
                </div>
              </div>
            </div>

            {/* 3-dot menu */}
            {!selectMode&&<button onClick={e=>{e.stopPropagation();setQuickEdit(c)}} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:22,padding:"8px 4px",flexShrink:0}}>⋮</button>}
          </div>;
        })}
      </div>

      {/* Drag indicator banner */}
      {(dragContact||touchDrag)&&<div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"8px 16px",background:"rgba(37,211,102,0.1)",borderBottom:"1px solid rgba(37,211,102,0.2)",zIndex:90,textAlign:"center",fontSize:14,color:"#25D366",fontWeight:500,animation:"fadeUp 0.15s"}}>
        ⬆ גרור לשורת הסטטוסים כדי לשנות
      </div>}

      {/* Touch drag ghost */}
      {touchDrag&&touchGhost&&<div style={{position:"fixed",left:touchGhost.x-30,top:touchGhost.y-30,zIndex:200,pointerEvents:"none",animation:"fadeUp 0.1s"}}>
        <div style={{width:60,height:60,borderRadius:18,background:"rgba(37,211,102,0.15)",border:"2px solid #25D366",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,boxShadow:"0 8px 30px rgba(0,0,0,0.5)"}}>{touchDrag.emoji}</div>
        <div style={{textAlign:"center",marginTop:4,fontSize:11,color:"#25D366",fontWeight:600,textShadow:"0 1px 4px rgba(0,0,0,0.8)"}}>{touchDrag.name}</div>
      </div>}

      <Footer/>
    </div>;
  }

  // ═══ CHAT ═══
  return<div style={S.shell}>
    <div style={{background:"#10131A",borderBottom:"1px solid rgba(255,255,255,0.03)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
      <button onClick={()=>{setActiveChat(null);setReplyText("");setShowPremade(false)}} style={S.backBtn}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg></button>
      <div onClick={()=>setQuickEdit(ac)} style={{display:"flex",alignItems:"center",gap:12,flex:1,cursor:"pointer"}}>
        <Av emoji={ac.emoji} pic={ac.profile_pic} size={46} radius={14} fontSize={24}/>
        <div><div style={{fontWeight:600,fontSize:18,color:"#F0F0F0"}}>{displayName}</div><div style={{fontSize:12,color:"#555",fontFamily:"monospace"}}>{ac.number}</div></div>
      </div>
      <StatusBadge status={ac.handleStatus} big/>
      <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,padding:"5px 10px",borderRadius:8,border:"1px solid",marginLeft:4,background:win.open?"rgba(37,211,102,0.1)":"rgba(239,68,68,0.08)",color:win.open?"#25D366":"#EF4444",borderColor:win.open?"rgba(37,211,102,0.2)":"rgba(239,68,68,0.15)"}}>
        <div style={{width:6,height:6,borderRadius:3,backgroundColor:win.open?"#25D366":"#EF4444"}}/>{win.open?"פתוח":"נעול"}
      </div>
    </div>

    {/* Quick edit overlay in chat */}
    {quickEdit&&<QuickEdit contact={quickEdit} tags={tags} onClose={()=>setQuickEdit(null)} onSave={u=>{updateMeta(quickEdit.number,u);setQuickEdit(null)}}/>}

    {ac.tags.length>0&&<div style={{padding:"6px 16px",display:"flex",gap:4,flexWrap:"wrap",borderBottom:"1px solid rgba(255,255,255,0.02)"}}>{ac.tags.map(t=>{const tag=tags.find(x=>x.name===t);return<TagPill key={t} name={t} color={tag?.color||"#888"} onClick={()=>setQuickEdit(ac)}/>})}</div>}

    <div style={{padding:"8px 16px",borderBottom:"1px solid",background:win.open?"rgba(37,211,102,0.03)":"rgba(239,68,68,0.02)",borderBottomColor:win.open?"rgba(37,211,102,0.05)":"rgba(239,68,68,0.05)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:500}}>
        {win.open?<><span style={{color:"#25D366"}}>🔓</span><span style={{color:"#8BC9A0"}}>{fmtRem(win.remaining)}</span><div style={{flex:1,height:3,background:"rgba(255,255,255,0.04)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:"linear-gradient(90deg,#128C7E,#25D366)",borderRadius:2,width:`${(win.remaining/(24*60*60*1000))*100}%`}}/></div></>
        :<><span style={{color:"#EF4444"}}>🔒</span><span style={{color:"#888"}}>נעול — ממתין לתשובה</span></>}
      </div>
    </div>

    <div style={{flex:1,overflow:"auto",padding:"16px 14px 160px",display:"flex",flexDirection:"column",gap:4,background:"#0A0C0F"}}>
      {chatGroups.map((item,i)=>{
        if(item.type==="date")return<div key={`d${i}`} style={{textAlign:"center",padding:"14px 0 6px"}}><span style={{fontSize:12,color:"#444",background:"rgba(255,255,255,0.025)",padding:"4px 14px",borderRadius:8,fontWeight:500}}>{item.label}</span></div>;
        const m=item.data,out=m.direction==="out",failed=m.status==="failed";
        return<div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:out?"flex-end":"flex-start",animation:"fadeUp 0.12s ease-out both"}}>
          <div style={{maxWidth:"82%",borderRadius:16,padding:"10px 14px 6px",...(out?{background:failed?"#3D1A1A":"#173D2A",borderBottomRightRadius:4}:{background:"#1A1C22",borderBottomLeftRadius:4,border:"1px solid rgba(255,255,255,0.03)"})}}>
            <div style={{fontSize:16,lineHeight:1.55,whiteSpace:"pre-wrap",wordBreak:"break-word",color:failed?"#F0A0A0":"#DDD"}} dir="rtl">{m.message}</div>
            <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:5,marginTop:3}}>
              <span style={{fontSize:11,color:"#555"}}>{fmtTime(m.created_at)}</span>
              {out&&<Stat s={m.status} sz={15}/>}
            </div>
          </div>
          {failed&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
            <span style={{fontSize:12,color:"#EF4444"}}>⚠ נכשל</span>
            <button onClick={()=>resendMsg(m)} style={{fontSize:12,fontWeight:600,color:"#F97316",background:"rgba(249,115,22,0.08)",border:"1px solid rgba(249,115,22,0.2)",borderRadius:8,padding:"4px 12px",cursor:"pointer",fontFamily:"inherit"}}>שלח שוב ↻</button>
          </div>}
        </div>;
      })}
      <div ref={chatEndRef}/>
    </div>

    {showPremade&&win.open&&<div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 28px)",maxWidth:452,background:"#161920",border:"1px solid rgba(255,255,255,0.05)",borderRadius:18,zIndex:60,animation:"slideUp 0.2s ease-out",maxHeight:300,overflow:"auto",boxShadow:"0 -8px 30px rgba(0,0,0,0.5)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.03)",position:"sticky",top:0,background:"#161920",borderRadius:"18px 18px 0 0"}}>
        <span style={{fontWeight:600,fontSize:15,color:"#bbb"}}>הודעות מוכנות</span>
        <button onClick={()=>setShowPremade(false)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:16}}>✕</button>
      </div>
      <div style={{padding:"4px 0"}}>{templates.map(t=>
        <div key={t.id} style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.02)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{fontSize:15,fontWeight:500,color:"#ddd"}}>{t.label}</span>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>insertPremade(t)} style={{fontSize:12,fontWeight:500,color:"#888",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontFamily:"inherit"}}>ערוך ✏</button>
              <button onClick={()=>sendReply(t.text.replace(/\{name\}/g,displayName))} style={{fontSize:12,fontWeight:600,color:"#25D366",background:"rgba(37,211,102,0.08)",border:"1px solid rgba(37,211,102,0.2)",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontFamily:"inherit"}}>שלח →</button>
            </div>
          </div>
          <div style={{fontSize:13,color:"#555",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} dir="rtl">{t.text.replace(/\{name\}/g,displayName).split("\n")[0]}</div>
        </div>
      )}</div>
    </div>}

    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"linear-gradient(to top,#10131A 85%,rgba(16,19,26,0.97))",padding:"10px 16px calc(16px + env(safe-area-inset-bottom))",borderTop:"1px solid rgba(255,255,255,0.03)",zIndex:50}}>
      {showSent&&<div style={{textAlign:"center",color:"#25D366",fontSize:14,fontWeight:500,marginBottom:8,animation:"toast 2s ease-out forwards"}}>✓ נשלח</div>}
      {win.open?<div style={{display:"flex",alignItems:"flex-end",gap:10}}>
        <button onClick={()=>setShowPremade(!showPremade)} style={{width:48,height:48,borderRadius:14,border:"1px solid",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20,background:showPremade?"rgba(37,211,102,0.12)":"rgba(255,255,255,0.03)",borderColor:showPremade?"rgba(37,211,102,0.25)":"rgba(255,255,255,0.05)"}}>📝</button>
        <textarea ref={inputRef} value={replyText} onChange={e=>setReplyText(e.target.value)} placeholder={`כתוב ל${displayName}...`} style={{flex:1,padding:"13px 16px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:16,color:"#E5E5E5",fontSize:16,fontFamily:"inherit",resize:"none",lineHeight:1.4,maxHeight:120,overflow:"auto"}} rows={1} dir="rtl"
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendReply()}}}
          onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px"}}/>
        <button onClick={()=>sendReply()} disabled={!replyText.trim()||sending} style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#25D366,#128C7E)",border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:!replyText.trim()||sending?0.3:1}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      :<div style={{display:"flex",alignItems:"center",gap:14,padding:"10px 8px",borderRadius:16,background:"rgba(239,68,68,0.03)",border:"1px solid rgba(239,68,68,0.07)"}}>
        <div style={{width:48,height:48,borderRadius:14,background:"rgba(239,68,68,0.06)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>🔒</div>
        <div><div style={{fontSize:14,fontWeight:600,color:"#EF4444"}}>החלון נעול</div><div style={{fontSize:12,color:"#666",marginTop:2}}>הלקוח צריך להשיב כדי לפתוח חלון חדש</div></div>
      </div>}
    </div>
  </div>;
}

const S={
  shell:{fontFamily:"'Rubik',system-ui,sans-serif",background:"#0A0C0F",minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",color:"#E5E5E5",position:"relative"},
  header:{background:"#10131A",borderBottom:"1px solid rgba(255,255,255,0.03)",padding:"20px 20px 16px"},
  headerInner:{display:"flex",justifyContent:"space-between",alignItems:"center"},
  hdrBtn:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:12,width:42,height:42,display:"flex",alignItems:"center",justifyContent:"center",color:"#777",cursor:"pointer",fontSize:18,fontFamily:"inherit"},
  statusTabs:{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.03)",overflow:"auto"},
  stTab:{flex:"none",padding:"12px 16px",background:"none",border:"none",borderBottom:"2.5px solid transparent",color:"#555",fontSize:14,fontWeight:500,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"},
  backBtn:{background:"none",border:"none",color:"#25D366",cursor:"pointer",padding:4,display:"flex"},
  detailHead:{background:"#10131A",borderBottom:"1px solid rgba(255,255,255,0.03)",padding:"16px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50},
  saveBtn:{padding:"10px 18px",background:"linear-gradient(135deg,#25D366,#128C7E)",border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"},
  fieldInput:{width:"100%",padding:"14px 16px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,color:"#E5E5E5",fontSize:16,fontFamily:"inherit"},
  fg:{marginBottom:18},
  fl:{fontSize:13,color:"#666",fontWeight:500,marginBottom:8,display:"block"},
  tagToggle:{padding:"8px 14px",borderRadius:10,border:"1px solid",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"inherit",background:"transparent"},
  miniStat:{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:12,padding:"12px 8px",textAlign:"center"},
  actionBtn:{display:"flex",alignItems:"center",gap:10,padding:"16px 18px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:14,color:"#999",fontSize:15,fontWeight:500,cursor:"pointer",fontFamily:"inherit",width:"100%"},
  sTabs:{display:"flex",gap:0,borderBottom:"1px solid rgba(255,255,255,0.03)"},
  sTab:{flex:1,padding:"13px 0",background:"none",border:"none",borderBottom:"2.5px solid transparent",color:"#666",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"},
  sTabActive:{color:"#25D366",borderBottomColor:"#25D366"},
  costCard:{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:16,padding:"20px 16px",textAlign:"center"},
  costRow:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"},
  accountItem:{display:"flex",alignItems:"center",gap:16,borderBottom:"1px solid rgba(255,255,255,0.03)",cursor:"pointer"},
  accountIcon:{width:48,height:48,borderRadius:14,background:"rgba(255,255,255,0.03)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:22},
  pmEditBtn:{fontSize:12,fontWeight:500,color:"#888",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontFamily:"inherit"},
  footer:{padding:"28px 20px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:10},
  referralBtn:{marginTop:8,padding:"14px 28px",background:"linear-gradient(135deg,rgba(232,185,49,0.1),rgba(232,185,49,0.04))",border:"1px solid rgba(232,185,49,0.18)",borderRadius:14,color:"#E8B931",fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:"inherit"},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
