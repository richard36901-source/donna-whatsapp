// ── Icons ──
function Stat({s,sz=14}){
  if(s==="sent")return<svg width={sz} height={sz} viewBox="0 0 20 20" fill="none"><path d="M5 10l3 3 7-7" stroke="#666" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if(s==="delivered")return<svg width={sz} height={sz} viewBox="0 0 20 20" fill="none"><path d="M3 10l3 3 7-7" stroke="#666" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M8 10l3 3 7-7" stroke="#666" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if(s==="seen")return<svg width={sz} height={sz} viewBox="0 0 20 20" fill="none"><path d="M3 10l3 3 7-7" stroke="#34B7F1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M8 10l3 3 7-7" stroke="#34B7F1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if(s==="failed")return<svg width={sz} height={sz} viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="#EF4444" strokeWidth="2"/><path d="M10 7v3" stroke="#EF4444" strokeWidth="2" strokeLinecap="round"/><circle cx="10" cy="13.5" r=".8" fill="#EF4444"/></svg>;
  return null;
}

// ── Helpers ──
function timeAgo(d){const n=new Date(),dt=new Date(d),s=Math.floor((n-dt)/1000);if(s<60)return"עכשיו";if(s<3600)return`${Math.floor(s/60)} ד׳`;if(s<86400)return`${Math.floor(s/3600)} ש׳`;if(s<604800)return`${Math.floor(s/86400)} י׳`;return dt.toLocaleDateString("he-IL")}
function fmtTime(d){return new Date(d).toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})}
function fmtDate(d){const dt=new Date(d),t=new Date(),y=new Date(t);y.setDate(y.getDate()-1);if(dt.toDateString()===t.toDateString())return"היום";if(dt.toDateString()===y.toDateString())return"אתמול";return dt.toLocaleDateString("he-IL",{day:"numeric",month:"short",year:"numeric"})}
const CLR=["#E8B931","#4ECDC4","#FF6B6B","#A78BFA","#F97316","#06B6D4","#EC4899","#84CC16","#F43F5E","#8B5CF6"];
function clr(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return CLR[Math.abs(h)%CLR.length]}
function winInfo(msgs){const inc=msgs.filter(m=>m.direction==="in");if(!inc.length)return{open:false,remaining:0};const last=inc[inc.length-1],t=new Date(last.created_at),rem=24*60*60*1000-(new Date()-t);return{open:rem>0,remaining:Math.max(0,rem)}}
function fmtRem(ms){const h=Math.floor(ms/(1000*60*60)),m=Math.floor((ms%(1000*60*60))/(1000*60));return h>0?`${h}:${String(m).padStart(2,'0')} שעות`:`${m} דקות`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function buildContacts(msgs,meta={}){
  const m={};
  msgs.forEach(x=>{if(!m[x.number])m[x.number]={name:x.name,number:x.number,messages:[],unread:0,tags:[],profile_pic:"",display_name:"",handleStatus:"חדש"};m[x.number].messages.push(x);if(x.direction==="in")m[x.number].unread++});
  return Object.values(m).map(c=>{
    c.messages.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    c.lastMessage=c.messages[c.messages.length-1];c.lastTime=c.lastMessage.created_at;
    c.window=winInfo(c.messages);c.failedCount=c.messages.filter(m=>m.status==="failed").length;
    const mt=meta[c.number];if(mt){c.tags=mt.tags||[];c.profile_pic=mt.profile_pic||"";c.display_name=mt.display_name||"";c.handleStatus=mt.handleStatus||"חדש"}
    return c;
  }).sort((a,b)=>new Date(b.lastTime)-new Date(a.lastTime));
}
function groupByDate(msgs){const g=[];let cur=null;msgs.forEach(m=>{const d=new Date(m.created_at).toDateString();if(d!==cur){cur=d;g.push({type:"date",label:fmtDate(m.created_at)})}g.push({type:"message",data:m})});return g}

// ── Shared Components ──
function Av({name,pic,size=50,radius=15,fontSize=21}){
  if(pic)return<img src={pic} style={{width:size,height:size,borderRadius:radius,objectFit:"cover"}} alt=""/>;
  return<div style={{width:size,height:size,borderRadius:radius,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:600,fontSize,color:"#fff",backgroundColor:clr(name),flexShrink:0}}>{name.charAt(0)}</div>;
}
function TagPill({name,color,small,onRemove}){
  return<span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:small?9:11,fontWeight:500,color,background:color+"18",border:`1px solid ${color}30`,borderRadius:6,padding:small?"1px 5px":"2px 8px",whiteSpace:"nowrap"}}>
    {name}{onRemove&&<button onClick={e=>{e.stopPropagation();onRemove()}} style={{background:"none",border:"none",color:color+"99",cursor:"pointer",fontSize:9,padding:0}}>✕</button>}
  </span>;
}
function StatusBadge({status,small}){
  const s=STATUSES.find(x=>x.key===status)||STATUSES[0];
  return<span style={{fontSize:small?9:10,fontWeight:600,color:s.color,background:s.color+"15",border:`1px solid ${s.color}25`,borderRadius:5,padding:small?"1px 5px":"2px 7px",whiteSpace:"nowrap"}}>{s.icon} {s.label}</span>;
}

// ══════ LOGIN ══════
function LoginPage({onLogin}){
  const[email,setEmail]=React.useState("");const[pass,setPass]=React.useState("");const[loading,setLoading]=React.useState(false);const[error,setError]=React.useState("");
  async function go(e){e.preventDefault();setLoading(true);setError("");const{data,error:err}=await sb.auth.signInWithPassword({email,password:pass});if(err){setError(err.message);setLoading(false);return}onLogin(data.user)}

      <div style={{textAlign:"center",marginBottom:40}}><div style={{fontSize:36,fontWeight:700,color:"#F5F5F5",marginBottom:4}}>⚡ Autoscale</div><div style={{fontSize:14,color:"#25D366",fontWeight:500}}>WhatsApp · דונה</div></div>
      <form onSubmit={go}>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="אימייל" required dir="ltr" style={{...S.fieldInput,marginBottom:14}}/>
        <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="סיסמה" required dir="ltr" style={{...S.fieldInput,marginBottom:20}}/>

        <button type="submit" disabled={loading} style={{width:"100%",padding:14,background:"linear-gradient(135deg,#25D366,#128C7E)",border:"none",borderRadius:14,color:"#fff",fontSize:16,fontWeight:600,cursor:"pointer",fontFamily:"inherit",opacity:loading?0.6:1}}>{loading?"מתחבר...":"התחבר"}</button>
      </form>
      <div style={{textAlign:"center",marginTop:30}}><a href={WEBSITE} target="_blank" style={{fontSize:11,color:"#444"}}>נבנה ע״י AutoScale ⚡ אוטומציות חכמות</a></div>
    </div>
  </div>;
}

// ══════ CONTACT DETAIL ══════
function ContactDetail({contact,tags:allTags,onClose,onSave,onDelete}){

// ══════ SETTINGS ══════
function SettingsPage({messages,onClose,user,onLogout,tags,onAddTag,onDeleteTag,templates,onSetTemplates}){
  const[tab,setTab]=React.useState("templates");
  const[newTag,setNewTag]=React.useState("");const[newColor,setNewColor]=React.useState("#4ECDC4");
  const[changingPass,setChangingPass]=React.useState(false);const[newPass,setNewPass]=React.useState("");const[passMsg,setPassMsg]=React.useState("");
  const[editingTpl,setEditingTpl]=React.useState(null);
  const[tplLabel,setTplLabel]=React.useState("");const[tplText,setTplText]=React.useState("");

  const out=messages.filter(m=>m.direction==="out");const total=(out.length*COST_PER_MSG).toFixed(2);
  const byMonth={};out.forEach(m=>{const d=new Date(m.created_at),k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;if(!byMonth[k])byMonth[k]={count:0,cost:0};byMonth[k].count++;byMonth[k].cost+=COST_PER_MSG});

  async function changePassword(){if(!newPass||newPass.length<6){setPassMsg("לפחות 6 תווים");return}const{error}=await sb.auth.updateUser({password:newPass});if(error)setPassMsg(error.message);else{setPassMsg("✓ עודכן");setNewPass("");setTimeout(()=>{setChangingPass(false);setPassMsg("")},2000)}}

  function startAddTpl(){setEditingTpl("new");setTplLabel("");setTplText("")}
  function startEditTpl(t){setEditingTpl(t.id);setTplLabel(t.label);setTplText(t.text)}
  function saveTpl(){
    if(!tplLabel.trim()||!tplText.trim())return;
    if(editingTpl==="new"){onSetTemplates([...templates,{id:uid(),label:tplLabel,text:tplText}])}
    else{onSetTemplates(templates.map(t=>t.id===editingTpl?{...t,label:tplLabel,text:tplText}:t))}
    setEditingTpl(null);
  }
  function deleteTpl(id){onSetTemplates(templates.filter(t=>t.id!==id))}

  const tagColors=["#E8B931","#4ECDC4","#FF6B6B","#A78BFA","#F97316","#06B6D4","#EC4899","#84CC16","#25D366","#EF4444"];

  return<div style={S.shell}>
    <div style={S.detailHead}>
      <button onClick={onClose} style={S.backBtn}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg></button>
      <div style={{fontSize:18,fontWeight:700,color:"#F0F0F0"}}>הגדרות</div><div style={{width:30}}/>
    </div>
    <div style={S.sTabs}>
      {[["templates","📝 תבניות"],["tags","🏷 תגיות"],["costs","💰 עלויות"],["account","👤 חשבון"]].map(([k,l])=>
        <button key={k} onClick={()=>setTab(k)} style={{...S.sTab,...(tab===k?S.sTabActive:{})}}>{l}</button>
      )}
    </div>
    <div style={{flex:1,overflow:"auto",padding:"0 0 40px"}}>

      {/* Templates */}
      {tab==="templates"&&<div style={{padding:16}}>
        {editingTpl?<div style={{animation:"fadeUp 0.2s"}}>
          <div style={{fontSize:14,fontWeight:600,color:"#ccc",marginBottom:12}}>{editingTpl==="new"?"הוסף תבנית":"ערוך תבנית"}</div>
          <div style={S.fieldGroup}><label style={S.fieldLabel}>שם / אייקון</label><input value={tplLabel} onChange={e=>setTplLabel(e.target.value)} style={S.fieldInput} dir="rtl" placeholder="👋 פתיחה"/></div>
          <div style={S.fieldGroup}><label style={S.fieldLabel}>תוכן ההודעה <span style={{color:"#555"}}>(השתמש ב-{"{name}"} לשם הלקוח)</span></label>
            <textarea value={tplText} onChange={e=>setTplText(e.target.value)} style={{...S.fieldInput,minHeight:100,resize:"vertical"}} dir="rtl" rows={4} placeholder={"היי {name},\nמה שלומך?"}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setEditingTpl(null)} style={{...S.actionBtn,flex:1,justifyContent:"center"}}>ביטול</button>
            <button onClick={saveTpl} style={{...S.saveBtn,flex:1,padding:"12px",textAlign:"center"}}>💾 שמור</button>
          </div>
        </div>
        :<>
          <button onClick={startAddTpl} style={{...S.saveBtn,width:"100%",padding:"12px",marginBottom:16,textAlign:"center",fontSize:14}}>+ הוסף תבנית חדשה</button>
          {templates.map(t=><div key={t.id} style={{padding:"12px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:14,fontWeight:500,color:"#ddd"}}>{t.label}</span>

                <button onClick={()=>startEditTpl(t)} style={S.pmEditBtn}>✏ ערוך</button>

              </div>
            </div>
            <div style={{fontSize:12,color:"#555",whiteSpace:"pre-wrap",maxHeight:40,overflow:"hidden"}} dir="rtl">{t.text}</div>
          </div>)}
          {templates.length===0&&<div style={{color:"#555",fontSize:13,padding:30,textAlign:"center"}}>אין תבניות</div>}
        </>}
      </div>}

      {/* Tags */}
      {tab==="tags"&&<div style={{padding:16}}>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input value={newTag} onChange={e=>setNewTag(e.target.value)} placeholder="תגית חדשה..." style={{...S.fieldInput,flex:1}} dir="rtl"/>
          <button onClick={()=>{if(newTag.trim()){onAddTag(newTag.trim(),newColor);setNewTag("")}}} style={{...S.saveBtn,padding:"10px 16px"}}>הוסף</button>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
          {tagColors.map(c=><button key={c} onClick={()=>setNewColor(c)} style={{width:26,height:26,borderRadius:7,backgroundColor:c,border:newColor===c?"2px solid #fff":"2px solid transparent",cursor:"pointer"}}/>)}
        </div>
        {tags.map(t=><div key={t.name} style={{...S.costRow}}><TagPill name={t.name} color={t.color}/><button onClick={()=>onDeleteTag(t.name)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:13}}>🗑</button></div>)}
      </div>}

      {/* Costs */}
      {tab==="costs"&&<div style={{padding:16}}>
        <div style={S.costGrid}>
          <div style={S.costCard}><div style={S.costLabel}>הודעות יוצאות</div><div style={S.costValue}>{out.length}</div></div>
          <div style={S.costCard}><div style={S.costLabel}>עלות כוללת</div><div style={{...S.costValue,color:"#E8B931"}}>${total}</div></div>
        </div>
        {Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([mo,d])=>
          <div key={mo} style={S.costRow}><span style={{color:"#aaa",fontSize:14}}>{mo}</span><div style={{display:"flex",gap:16,alignItems:"center"}}><span style={{color:"#666",fontSize:13}}>{d.count}</span><span style={{color:"#E8B931",fontWeight:600}}>${d.cost.toFixed(2)}</span></div></div>
        )}
      </div>}

      {/* Account */}
      {tab==="account"&&<div style={{padding:16}}>
        <div style={S.accountItem} onClick={()=>setChangingPass(!changingPass)}>
          <div style={S.accountIcon}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:"#ddd"}}>שינוי סיסמה</div><div style={{fontSize:12,color:"#666",marginTop:2}}>{user?.email}</div></div>
        </div>
        {changingPass&&<div style={{padding:"12px 0",animation:"fadeUp 0.2s"}}>
          <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="סיסמה חדשה" dir="ltr" style={{...S.fieldInput,marginBottom:10}}/>
          {passMsg&&<div style={{fontSize:12,color:passMsg.startsWith("✓")?"#25D366":"#EF4444",marginBottom:10}}>{passMsg}</div>}
          <button onClick={changePassword} style={{...S.saveBtn,padding:"10px 20px"}}>עדכן</button>
        </div>}
        <div style={{...S.accountItem,borderBottom:"none"}} onClick={onLogout}>
          <div style={{...S.accountIcon,background:"rgba(239,68,68,0.08)"}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EF4444" strokeWidth="2" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:"#EF4444"}}>התנתקות</div></div>
        </div>
        <div style={{marginTop:30,textAlign:"center"}}>
          <div style={{fontSize:12,color:"#333"}}>Autoscale WhatsApp · v1.2.0</div>
          <a href={WEBSITE} target="_blank" style={{fontSize:11,color:"#444",display:"block",marginTop:6}}>autoscale.co.il</a>
        </div>
      </div>}
    </div>
  </div>;
}

// ══════ FOOTER ══════
function Footer(){return<div style={S.footer}>
  <div style={{width:40,height:1,background:"rgba(255,255,255,0.04)",marginBottom:8}}/>
  <a href={WEBSITE} target="_blank" rel="noopener" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
    <span style={{fontSize:11,color:"#444"}}>נבנה ע״י</span><span style={{fontSize:13,fontWeight:600,color:"#888"}}>⚡ AutoScale</span><span style={{fontSize:11,color:"#555"}}>אוטומציות חכמות</span>
  </a>
  <a href={"mailto:"+EMAIL_ADDR} style={{fontSize:11,color:"#444"}}>{EMAIL_ADDR}</a>
  <button style={S.referralBtn} onClick={()=>alert("קישור הפניה הועתק! שתף עם חבר וקבל חודש חינם 🎁")}>🎁 המלץ וקבל חודש חינם</button>
</div>}

// ══════ MAIN APP ══════
function App(){
  const[user,setUser]=React.useState(null);
  const[loading,setLoading]=React.useState(true);
  const[messages,setMessages]=React.useState([]);
  const[meta,setMeta]=React.useState({});
  const[tags,setTags]=React.useState(DEFAULT_TAGS);
  const[templates,setTemplates]=React.useState(DEFAULT_TEMPLATES);
  const[view,setView]=React.useState("contacts");
  const[activeChat,setActiveChat]=React.useState(null);
  const[showDetail,setShowDetail]=React.useState(false);
  const[replyText,setReplyText]=React.useState("");
  const[sending,setSending]=React.useState(false);
  const[search,setSearch]=React.useState("");
  const[showSent,setShowSent]=React.useState(false);
  const[showPremade,setShowPremade]=React.useState(false);
  const[statusFilter,setStatusFilter]=React.useState("all");
  const[selectMode,setSelectMode]=React.useState(false);
  const[selected,setSelected]=React.useState(new Set());
  const[bulkConfirm,setBulkConfirm]=React.useState(false);
  const chatEndRef=React.useRef(null);
  const inputRef=React.useRef(null);

  // Auth
  React.useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{if(session?.user){setUser(session.user);fetchMessages(session.user.id)}setLoading(false)});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{if(session?.user)setUser(session.user);else{setUser(null);setMessages([])}});
    return()=>subscription.unsubscribe();
  },[]);

  // Realtime
  React.useEffect(()=>{
    if(!user)return;
    const ch=sb.channel('msg-rt')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`user_id=eq.${user.id}`},p=>setMessages(prev=>[...prev,p.new]))
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:`user_id=eq.${user.id}`},p=>setMessages(prev=>prev.map(m=>m.id===p.new.id?p.new:m)))
      .subscribe();
    return()=>sb.removeChannel(ch);
  },[user]);

  async function fetchMessages(uid){const{data}=await sb.from('messages').select('*').eq('user_id',uid).order('created_at',{ascending:true});if(data)setMessages(data)}
  async function handleLogout(){await sb.auth.signOut();setUser(null);setMessages([]);setView("contacts");setActiveChat(null)}

  function updateMeta(number,updates){setMeta(prev=>({...prev,[number]:{...(prev[number]||{}),number,...updates}}))}
  function addTag(n,c){if(!tags.find(t=>t.name===n))setTags(p=>[...p,{name:n,color:c}])}
  function deleteTag(n){setTags(p=>p.filter(t=>t.name!==n))}

  // Send read receipts when opening chat
  function openChat(number){
    setActiveChat(number);
    const contact=contacts.find(c=>c.number===number);
    if(contact&&READ_WEBHOOK){
      const unreadIds=contact.messages.filter(m=>m.direction==="in"&&m.message_id).map(m=>m.message_id);
      if(unreadIds.length){fetch(READ_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"read",number,message_ids:unreadIds})}).catch(()=>{})}
    }
    // Auto set status to בטיפול if חדש
    if(contact){
      const currentStatus=(meta[number]?.handleStatus)||"חדש";
      if(currentStatus==="חדש")updateMeta(number,{handleStatus:"בטיפול"});
    }
  }

  const contacts=buildContacts(messages,meta);
  const totalUnread=contacts.reduce((s,c)=>s+c.unread,0);
  const visibleContacts=contacts.filter(c=>{
    if(statusFilter!=="all"&&c.handleStatus!==statusFilter)return false;
    if(!search)return true;
    const q=search.toLowerCase(),dn=(c.display_name||c.name).toLowerCase();
    return dn.includes(q)||c.number.includes(q)||c.tags.some(t=>t.toLowerCase().includes(q));
  });

  const ac=activeChat?contacts.find(c=>c.number===activeChat):null;
  const chatGroups=ac?groupByDate(ac.messages):[];
  const win=ac?ac.window:{open:false};
  const displayName=ac?(ac.display_name||ac.name):"";

  React.useEffect(()=>{if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:"smooth"})},[activeChat,messages]);
  React.useEffect(()=>{if(activeChat&&inputRef.current&&win.open)inputRef.current.focus()},[activeChat]);

  async function sendReply(text){
    const msg=text||replyText;if(!msg.trim()||!ac)return;setSending(true);
    try{await fetch(REPLY_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:ac.number,name:displayName,message:msg.trim()})})}catch(e){console.error(e)}
    // Auto-move to בטיפול
    updateMeta(ac.number,{handleStatus:"בטיפול"});
    setShowSent(true);setTimeout(()=>setShowSent(false),2200);setSending(false);setReplyText("");setShowPremade(false);
  }
  async function resendMessage(msg){try{await fetch(REPLY_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:msg.number,name:msg.name,message:msg.message,resend_id:msg.message_id})})}catch(e){console.error(e)}}
  function insertPremade(pm){setReplyText(pm.text.replace(/\{name\}/g,displayName));setShowPremade(false);if(inputRef.current)inputRef.current.focus()}

  // Multi-select handlers
  function toggleSelect(number){setSelected(prev=>{const n=new Set(prev);n.has(number)?n.delete(number):n.add(number);return n})}
  function bulkSetStatus(status){selected.forEach(num=>updateMeta(num,{handleStatus:status}));setSelected(new Set());setSelectMode(false)}
  function bulkDelete(){selected.forEach(num=>{/* would delete from supabase */});setSelected(new Set());setSelectMode(false);setBulkConfirm(false)}

  if(loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0A0C0F"}}><div style={{width:28,height:28,border:"3px solid rgba(37,211,102,0.2)",borderTopColor:"#25D366",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;
  if(!user)return<LoginPage onLogin={u=>{setUser(u);fetchMessages(u.id)}}/>;
  if(view==="settings")return<SettingsPage messages={messages} onClose={()=>setView("contacts")} user={user} onLogout={handleLogout} tags={tags} onAddTag={addTag} onDeleteTag={deleteTag} templates={templates} onSetTemplates={setTemplates}/>;
  if(showDetail&&ac)return<ContactDetail contact={ac} tags={tags} onClose={()=>setShowDetail(false)} onSave={u=>{updateMeta(ac.number,u);setShowDetail(false)}} onDelete={()=>{setShowDetail(false);setActiveChat(null)}}/>;

  // ═══ CONTACTS ═══
  if(!activeChat){
    const statusCounts={};contacts.forEach(c=>{const s=c.handleStatus;statusCounts[s]=(statusCounts[s]||0)+1});
    return<div style={S.shell}>
      <div style={S.header}>
        <div style={S.headerInner}>
          <div><div style={S.brand}><span style={{fontSize:18}}>⚡</span>Autoscale</div><div style={S.brandSub}>WhatsApp · דונה</div></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {totalUnread>0&&<div style={S.unreadGlobal}>{totalUnread}</div>}
            <button onClick={()=>setSelectMode(!selectMode)} style={{...S.settingsBtn,borderColor:selectMode?"rgba(37,211,102,0.3)":"rgba(255,255,255,0.05)",color:selectMode?"#25D366":"#777"}} title="בחירה מרובה">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </button>
            <button onClick={()=>setView("settings")} style={S.settingsBtn}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
          </div>
        </div>
      </div>

      {/* Status filter tabs */}
      <div style={S.statusTabs}>
        <button onClick={()=>setStatusFilter("all")} style={{...S.statusTab,...(statusFilter==="all"?{color:"#F0F0F0",borderBottomColor:"#F0F0F0"}:{})}}>הכל <span style={{fontSize:10,color:"#555"}}>{contacts.length}</span></button>
        {STATUSES.map(st=><button key={st.key} onClick={()=>setStatusFilter(st.key)} style={{...S.statusTab,...(statusFilter===st.key?{color:st.color,borderBottomColor:st.color}:{})}}>{st.icon} {st.label} <span style={{fontSize:10,color:"#555"}}>{statusCounts[st.key]||0}</span></button>)}
      </div>

      <div style={{padding:"8px 16px 4px"}}><div style={S.searchBox}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#444" strokeWidth="2.5"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input type="text" placeholder="חיפוש..." value={search} onChange={e=>setSearch(e.target.value)} style={S.searchInput} dir="rtl"/>{search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:13}}>✕</button>}</div></div>

      {/* Bulk action bar */}
      {selectMode&&selected.size>0&&<div style={S.bulkBar}>
        <span style={{fontSize:13,color:"#ccc",fontWeight:500}}>{selected.size} נבחרו</span>
        <div style={{display:"flex",gap:6}}>
          {STATUSES.map(st=><button key={st.key} onClick={()=>bulkSetStatus(st.key)} style={{...S.bulkBtn,color:st.color,borderColor:st.color+"30"}}>{st.icon}</button>)}
          {!bulkConfirm?<button onClick={()=>setBulkConfirm(true)} style={{...S.bulkBtn,color:"#EF4444",borderColor:"rgba(239,68,68,0.3)"}}>🗑</button>
          :<button onClick={bulkDelete} style={{...S.bulkBtn,color:"#EF4444",background:"rgba(239,68,68,0.15)",borderColor:"rgba(239,68,68,0.4)"}}>⚠ אשר</button>}
        </div>
      </div>}

      <div style={{flex:1,overflow:"auto"}}>
        {messages.length===0&&<div style={{textAlign:"center",padding:"60px 20px",color:"#555"}}><div style={{fontSize:40,marginBottom:16}}>📭</div><div style={{fontSize:15,fontWeight:500,color:"#777"}}>אין הודעות עדיין</div></div>}
        {visibleContacts.map((c,i)=>{
          const isOut=c.lastMessage.direction==="out",dn=c.display_name||c.name,isSelected=selected.has(c.number);
          return<div key={c.number} style={{...S.contactRow,animationDelay:`${i*25}ms`,background:isSelected?"rgba(37,211,102,0.06)":"transparent"}} onClick={()=>selectMode?toggleSelect(c.number):openChat(c.number)}>
            {selectMode&&<div style={{...S.checkbox,borderColor:isSelected?"#25D366":"#444",background:isSelected?"#25D366":"transparent"}}>{isSelected&&<svg width="12" height="12" viewBox="0 0 20 20" fill="none"><path d="M5 10l3 3 7-7" stroke="#000" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}</div>}
            <div style={{position:"relative",flexShrink:0}}>
              <Av name={dn} pic={c.profile_pic} size={48} radius={14} fontSize={20}/>
              <div style={{position:"absolute",bottom:-1,right:-1,width:11,height:11,borderRadius:6,border:"2px solid #0A0C0F",backgroundColor:c.window.open?"#25D366":"#333"}}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontWeight:600,fontSize:14,color:"#F0F0F0"}}>{dn}</span>
                  <StatusBadge status={c.handleStatus} small/>
                  {c.failedCount>0&&<span style={{fontSize:9,color:"#EF4444",fontWeight:600}}>⚠{c.failedCount}</span>}
                </div>
                <span style={{fontSize:11,color:c.unread>0?"#25D366":"#444"}}>{timeAgo(c.lastTime)}</span>
              </div>
              {c.tags.length>0&&<div style={{display:"flex",gap:3,marginBottom:3,flexWrap:"wrap"}}>{c.tags.slice(0,3).map(t=>{const tag=tags.find(x=>x.name===t);return<TagPill key={t} name={t} color={tag?.color||"#888"} small/>})}</div>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:4,flex:1,minWidth:0}}>
                  {isOut&&<Stat s={c.lastMessage.status} sz={12}/>}
                  <span style={{fontSize:12,color:"#555",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} dir="rtl">{c.lastMessage.message.split("\n")[0].substring(0,38)}</span>
                </div>
                {c.unread>0&&<div style={S.badge}>{c.unread}</div>}
              </div>
            </div>
          </div>;
        })}
      </div>
      <Footer/>
    </div>;
  }

  // ═══ CHAT ═══
  return<div style={S.shell}>
    <div style={S.chatHead}>
      <button onClick={()=>{setActiveChat(null);setReplyText("");setShowPremade(false)}} style={S.backBtn}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg></button>
      <div onClick={()=>setShowDetail(true)} style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer"}}>
        <Av name={displayName} pic={ac.profile_pic} size={38} radius={11} fontSize={16}/>
        <div><div style={{fontWeight:600,fontSize:15,color:"#F0F0F0"}}>{displayName}</div><div style={{fontSize:10,color:"#444",fontFamily:"monospace"}}>{ac.number}</div></div>
      </div>
      <StatusBadge status={ac.handleStatus}/>
      <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:7,border:"1px solid",marginLeft:6,background:win.open?"rgba(37,211,102,0.1)":"rgba(239,68,68,0.08)",color:win.open?"#25D366":"#EF4444",borderColor:win.open?"rgba(37,211,102,0.2)":"rgba(239,68,68,0.15)"}}>
        <div style={{width:5,height:5,borderRadius:3,backgroundColor:win.open?"#25D366":"#EF4444"}}/>{win.open?"פתוח":"נעול"}
      </div>
    </div>

    {ac.tags.length>0&&<div style={{padding:"5px 14px",display:"flex",gap:3,flexWrap:"wrap",borderBottom:"1px solid rgba(255,255,255,0.02)"}}>{ac.tags.map(t=>{const tag=tags.find(x=>x.name===t);return<TagPill key={t} name={t} color={tag?.color||"#888"} small/>})}</div>}

    <div style={{padding:"6px 14px",borderBottom:"1px solid",background:win.open?"rgba(37,211,102,0.03)":"rgba(239,68,68,0.02)",borderBottomColor:win.open?"rgba(37,211,102,0.05)":"rgba(239,68,68,0.05)"}}>
      <div style={{display:"flex",alignItems:"center",gap:7,fontSize:11,fontWeight:500}}>
        {win.open?<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#25D366" strokeWidth="2.5" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span style={{color:"#8BC9A0"}}>{fmtRem(win.remaining)}</span><div style={{flex:1,height:2,background:"rgba(255,255,255,0.04)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:"linear-gradient(90deg,#128C7E,#25D366)",borderRadius:2,width:`${(win.remaining/(24*60*60*1000))*100}%`}}/></div></>
        :<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#EF4444" strokeWidth="2.5" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span style={{color:"#777"}}>נעול — ממתין לתשובה</span></>}
      </div>
    </div>

    <div style={{flex:1,overflow:"auto",padding:"12px 12px 150px",display:"flex",flexDirection:"column",gap:3,background:"#0A0C0F"}}>
      {chatGroups.map((item,i)=>{
        if(item.type==="date")return<div key={`d${i}`} style={{textAlign:"center",padding:"10px 0 5px"}}><span style={{fontSize:10,color:"#444",background:"rgba(255,255,255,0.02)",padding:"3px 12px",borderRadius:6,fontWeight:500}}>{item.label}</span></div>;
        const m=item.data,out=m.direction==="out",failed=m.status==="failed";
        return<div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:out?"flex-end":"flex-start",animation:"fadeUp 0.12s ease-out both"}}>
          <div style={{maxWidth:"82%",borderRadius:14,padding:"8px 12px 4px",...(out?{background:failed?"#3D1A1A":"#173D2A",borderBottomRightRadius:4}:{background:"#1A1C22",borderBottomLeftRadius:4,border:"1px solid rgba(255,255,255,0.03)"})}}>
            <div style={{fontSize:14,lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word",color:failed?"#F0A0A0":"#DDD"}} dir="rtl">{m.message}</div>
            <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:4,marginTop:2}}>
              <span style={{fontSize:10,color:"#555"}}>{fmtTime(m.created_at)}</span>
              {out&&<Stat s={m.status} sz={13}/>}
            </div>
          </div>
          {failed&&<div style={{display:"flex",alignItems:"center",gap:5,marginTop:3}}>
            <span style={{fontSize:10,color:"#EF4444"}}>⚠ נכשל</span>
            <button onClick={()=>resendMessage(m)} style={S.resendBtn}>שלח שוב ↻</button>
          </div>}
        </div>;
      })}
      <div ref={chatEndRef}/>
    </div>

    {showPremade&&win.open&&<div style={S.pmPanel}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.03)",position:"sticky",top:0,background:"#161920",borderRadius:"16px 16px 0 0"}}>
        <span style={{fontWeight:600,fontSize:13,color:"#bbb"}}>הודעות מוכנות</span>
        <button onClick={()=>setShowPremade(false)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:14}}>✕</button>
      </div>
      <div style={{padding:"4px 0"}}>{templates.map(t=>
        <div key={t.id} style={{padding:"9px 14px",borderBottom:"1px solid rgba(255,255,255,0.015)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
            <span style={{fontSize:13,fontWeight:500,color:"#ddd"}}>{t.label}</span>
            <div style={{display:"flex",gap:5}}>
              <button onClick={()=>insertPremade(t)} style={S.pmEditBtn}>ערוך ✏</button>
              <button onClick={()=>sendReply(t.text.replace(/\{name\}/g,displayName))} style={S.pmSendBtn}>שלח →</button>
            </div>
          </div>
          <div style={{fontSize:11,color:"#555",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} dir="rtl">{t.text.replace(/\{name\}/g,displayName).split("\n")[0]}</div>
        </div>
      )}</div>
    </div>}

    <div style={S.replyBar}>
      {showSent&&<div style={{textAlign:"center",color:"#25D366",fontSize:13,fontWeight:500,marginBottom:6,animation:"toast 2s ease-out forwards"}}>✓ נשלח</div>}
      {win.open?<div style={{display:"flex",alignItems:"flex-end",gap:8}}>
        <button onClick={()=>setShowPremade(!showPremade)} style={{...S.pmToggle,background:showPremade?"rgba(37,211,102,0.12)":"rgba(255,255,255,0.03)",borderColor:showPremade?"rgba(37,211,102,0.25)":"rgba(255,255,255,0.05)",color:showPremade?"#25D366":"#666"}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </button>
        <textarea ref={inputRef} value={replyText} onChange={e=>setReplyText(e.target.value)} placeholder={`כתוב ל${displayName}...`} style={S.input} rows={1} dir="rtl"
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendReply()}}}
          onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px"}}/>
        <button onClick={()=>sendReply()} disabled={!replyText.trim()||sending} style={{...S.sendBtn,opacity:!replyText.trim()||sending?0.3:1}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      :<div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 6px",borderRadius:14,background:"rgba(239,68,68,0.03)",border:"1px solid rgba(239,68,68,0.07)"}}>
        <div style={{width:42,height:42,borderRadius:12,background:"rgba(239,68,68,0.06)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#EF4444" strokeWidth="2" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <div><div style={{fontSize:12,fontWeight:600,color:"#EF4444"}}>החלון נעול</div><div style={{fontSize:10,color:"#666",marginTop:1}}>הלקוח צריך להשיב כדי לפתוח חלון חדש</div></div>
      </div>}
    </div>
  </div>;
}
